---
- hosts: all
  become: true

  tasks:
    # 1. System Update
    - name: Update and upgrade APT packages
      apt:
        update_cache: yes
        upgrade: dist
        cache_valid_time: 3600

    # 2. Tart Guest Agent (Direkt für ARM64)
    - name: Get latest Tart Guest Agent metadata
      uri:
        url: "https://api.github.com/repos/cirruslabs/tart-guest-agent/releases/latest"
      register: latest_release

    - name: Install Tart Guest Agent (ARM64)
      apt:
        deb: "{{ latest_release.json.assets | selectattr('name', 'search', 'linux_arm64.deb') | map(attribute='browser_download_url') | first }}"

    # 3. Netzwerk-Fix für VirtIO (Apple Silicon)
    - name: Install ethtool
      apt:
        name: ethtool
        state: present

    - name: Disable GRO to fix 'suspect GRO implementation'
      shell: |
        ethtool -K enp0s1 gro off
      ignore_errors: yes

    - name: Make GRO disable persistent via udev
      copy:
        dest: /etc/udev/rules.d/10-fix-network.rules
        content: |
          ACTION=="add", SUBSYSTEM=="net", NAME=="enp0s1", RUN+="/usr/sbin/ethtool -K enp0s1 gro off"

    # 4. Cleanup & Vorbereitung für VM-Templates
    - name: Remove unused packages and purge
      apt:
        autoremove: yes
        purge: yes

    - name: Clean APT cache
      apt:
        autoclean: yes

    - name: Reset Machine-ID for cloning
      shell: |
        truncate -s 0 /etc/machine-id
        rm -f /var/lib/dbus/machine-id
        ln -sf /etc/machine-id /var/lib/dbus/machine-id

    - name: Clear shell history
      shell: |
        history -c
        rm -f /root/.bash_history
        rm -f /home/*/.bash_history
 
